<div class="app-shell" [class.collapsed]="isSidebarCollapsed" [class.mobile-open]="isMobileOpen">
  <div class="sidebar-backdrop" *ngIf="isMobileOpen" (click)="closeMobile()"></div>
  <aside class="sidebar">
    <div class="sidebar-header">
      <span class="logo" *ngIf="!isSidebarCollapsed || isMobileOpen">SMS</span>
      <button class="toggle-btn" (click)="toggleSidebar()">{{ isSidebarCollapsed ? '☰' : '✕' }}</button>
    </div>
    <nav class="sidebar-nav">
      <a *ngFor="let item of navItems" [routerLink]="item.route" routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: item.route === '/schools' }" class="nav-item" (click)="closeMobile()">
        <span class="nav-icon">{{ item.icon }}</span>
        <span class="nav-label" *ngIf="!isSidebarCollapsed || isMobileOpen">{{ item.label }}</span>
      </a>
    </nav>
    <div class="sidebar-footer">
      <button class="logout-btn" (click)="logout()">
        <span class="nav-icon">🚪</span>
        <span class="nav-label" *ngIf="!isSidebarCollapsed || isMobileOpen">Logout</span>
      </button>
    </div>
  </aside>
  <div class="main-area">
    <header class="topbar">
      <div class="topbar-left">
        <button class="mobile-menu-btn" (click)="toggleMobile()">☰</button>
        <h2 class="page-title">School Management</h2>
      </div>
      <div class="topbar-right">
        <span class="super-badge">⚡ Super Admin</span>
        <app-notification-bell></app-notification-bell>
        <span class="user-badge">👤 {{ userLabel }}</span>
      </div>
    </header>
    <main class="content"><router-outlet /></main>
  </div>
</div>
