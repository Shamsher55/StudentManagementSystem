<div class="app-shell" [class.mobile-open]="isMobileOpen">

  <div class="sidebar-backdrop" *ngIf="isMobileOpen" (click)="closeMobile()"></div>

  <aside class="sidebar">
    <div class="sidebar-header">
      <span class="logo">SMS</span>
    </div>

    <div class="student-badge">
      <div class="avatar">{{ authService.getUser()?.name?.charAt(0) }}</div>
      <div class="student-info">
        <div class="student-name">{{ authService.getUser()?.name }}</div>
        <div class="student-role">Student</div>
      </div>
    </div>

    <nav class="sidebar-nav">
      <a
        *ngFor="let item of navItems"
        [routerLink]="item.route"
        routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: true }"
        class="nav-item"
        (click)="closeMobile()"
      >
        <span class="nav-icon">{{ item.icon }}</span>
        <span class="nav-label">{{ item.label }}</span>
      </a>
    </nav>

    <div class="sidebar-footer">
      <button class="logout-btn" (click)="logout()">
        <span class="nav-icon">🚪</span>
        <span class="nav-label">Logout</span>
      </button>
    </div>
  </aside>

  <div class="main-area">
    <header class="topbar">
      <div class="topbar-left">
        <button class="mobile-menu-btn" (click)="toggleMobile()">☰</button>
        <h2 class="page-title">Student Portal</h2>
      </div>
      <div class="topbar-right">
        <span class="role-badge student">🎓 Student</span>
      </div>
    </header>
    <main class="content">
      <router-outlet />
    </main>
  </div>

</div>
