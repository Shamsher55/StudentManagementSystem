<div class="bell-wrapper">
  <button class="bell-btn" (click)="toggle()">
    🔔
    <span class="badge" *ngIf="unreadCount > 0">{{ unreadCount }}</span>
  </button>

  <div class="dropdown" *ngIf="isOpen">
    <div class="dropdown-header">
      <span>Notifications ({{ unreadCount }} new)</span>
      <button class="mark-all" (click)="markAllRead()">Mark all read</button>
    </div>
    <div class="notif-list">
      <div class="notif-item" *ngFor="let n of notifications"
        [class.unread]="!n.isRead" (click)="markRead(n.id)">
        <span class="notif-icon">{{ n.type === 'attendance' ? '📋' : '📝' }}</span>
        <span class="notif-msg">{{ n.message }}</span>
        <span class="notif-dot" *ngIf="!n.isRead"></span>
      </div>
      <div class="notif-empty" *ngIf="notifications.length === 0">
        No notifications
      </div>
    </div>
  </div>
</div>
