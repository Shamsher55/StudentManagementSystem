<div class="page-wrapper">

  <div class="page-header">
    <h2>Mark Attendance</h2>
    <button class="btn-back" (click)="goBack()">← Back</button>
  </div>

  <!-- Selector -->
  <div class="selector-card">
    <div class="selector-row">
      <div class="field">
        <label>Date</label>
        <input type="date" [(ngModel)]="selectedDate" (change)="loadStudents()" />
      </div>
      <div class="field">
        <label>Course</label>
        <select [(ngModel)]="selectedCourse" (change)="loadStudents()">
          <option value="">-- Select Course --</option>
          <option *ngFor="let c of courses" [value]="c">{{ c }}</option>
        </select>
      </div>
    </div>
  </div>

  <!-- Success banner -->
  <div class="success-banner" *ngIf="saved">
    ✅ Attendance saved successfully!
  </div>

  <!-- Student table -->
  <div class="table-card" *ngIf="rows.length > 0">

    <div class="bulk-actions">
      <span class="bulk-label">Mark all:</span>
      <button class="btn-bulk present" (click)="markAll('Present')">Present</button>
      <button class="btn-bulk absent"  (click)="markAll('Absent')">Absent</button>
      <button class="btn-bulk late"    (click)="markAll('Late')">Late</button>
    </div>

    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>Student</th>
          <th>Email</th>
          <th>Status</th>
          <th>Note</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let r of rows; let i = index" [class.already-marked]="r.alreadyMarked">
          <td>{{ i + 1 }}</td>
          <td>{{ r.student.name }}</td>
          <td>{{ r.student.email }}</td>
          <td>
            <div class="status-btns" *ngIf="!r.alreadyMarked">
              <button [class.active]="r.status === 'Present'" class="sb present" (click)="r.status = 'Present'">Present</button>
              <button [class.active]="r.status === 'Absent'"  class="sb absent"  (click)="r.status = 'Absent'">Absent</button>
              <button [class.active]="r.status === 'Late'"    class="sb late"    (click)="r.status = 'Late'">Late</button>
            </div>
            <span *ngIf="r.alreadyMarked" class="already-tag">Already Marked</span>
          </td>
          <td>
            <span class="badge" *ngIf="!r.alreadyMarked" [ngClass]="r.status.toLowerCase()">{{ r.status }}</span>
          </td>
        </tr>
      </tbody>
    </table>

    <div class="form-actions" *ngIf="!submitted">
      <button class="btn-cancel" (click)="goBack()">Cancel</button>
      <button class="btn-submit" (click)="submit()">Save Attendance</button>
    </div>
  </div>

  <div class="empty-state" *ngIf="selectedCourse && rows.length === 0">
    No active students found for <strong>{{ selectedCourse }}</strong>.
  </div>

  <div class="hint" *ngIf="!selectedCourse">
    Select a date and course to load students.
  </div>

</div>
